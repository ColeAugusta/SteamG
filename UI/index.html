<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamMap</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<header>
    <h1>SteamMap</h1>
</header>

<div class="controls">
    <input type="text" id="steam-id-input" placeholder="Steam ID, username, or profile URL" />
    <button onclick="loadGames()">Load Games</button>
    <label for="group-by">Group by:</label>
    <select id="group-by" disabled>
        <option value="genre">Genre</option>
        <option value="tag">Tag</option>
    </select>
</div>

<div id="status"></div>

<div id="graph-container">
    <div id="tooltip">
        <div class="t-name" id="t-name"></div>
        <div class="t-hours" id="t-hours"></div>
        <div class="t-genres" id="t-genres"></div>
    </div>
    <div id="legend"></div>
    <div id="hint">Scroll to zoom &middot; Drag to pan<br>Click a node to open in Steam</div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="{{ url_for('static', filename='graph.js') }}"></script>

</body>
</html>
