<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamG</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1b2838;
            color: #c6d4df;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header { text-align: center; padding: 1rem 1rem 0.5rem; }
        header h1 { font-size: 2rem; color: #66c0f4; }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
        }

        .controls input {
            width: 320px;
            padding: 0.6rem 1rem;
            border-radius: 4px;
            border: 1px solid #4a6a8a;
            background: #2a3f5f;
            color: #c6d4df;
            font-size: 1rem;
        }

        .controls input::placeholder { color: #7a9ab5; }

        .controls button {
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            border: none;
            background: #4a90d9;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }

        .controls button:hover { background: #66c0f4; }

        #status {
            text-align: center;
            color: #7a9ab5;
            font-size: 0.875rem;
            min-height: 1.25rem;
            padding: 0 1rem 0.4rem;
        }

        #status.error { color: #e05b5b; }

        #graph-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #graph-container svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Tooltip */
        #tooltip {
            position: absolute;
            background: rgba(17, 28, 42, 0.96);
            border: 1px solid #4a6a8a;
            border-radius: 6px;
            padding: 0.6rem 0.85rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.12s;
            max-width: 220px;
            z-index: 20;
        }

        #tooltip .t-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #c6d4df;
            margin-bottom: 0.2rem;
        }

        #tooltip .t-hours {
            font-size: 0.8rem;
            color: #66c0f4;
            margin-bottom: 0.25rem;
        }

        #tooltip .t-genres {
            font-size: 0.75rem;
            color: #7a9ab5;
            line-height: 1.4;
        }

        /* Legend */
        #legend {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            background: rgba(17, 28, 42, 0.9);
            border: 1px solid #4a6a8a;
            border-radius: 6px;
            padding: 0.7rem 0.9rem;
            font-size: 0.78rem;
            display: none;
            max-width: 180px;
        }

        #legend h4 {
            color: #66c0f4;
            font-size: 0.8rem;
            margin-bottom: 0.4rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            margin-bottom: 0.2rem;
            color: #c6d4df;
        }

        .legend-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Hint */
        #hint {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            color: #3e5a75;
            font-size: 0.72rem;
            text-align: right;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<header>
    <h1>SteamG</h1>
</header>

<div class="controls">
    <input type="text" id="steam-id-input" placeholder="Steam ID, username, or profile URL" />
    <button onclick="loadGames()">Load Games</button>
</div>

<div id="status"></div>

<div id="graph-container">
    <div id="tooltip">
        <div class="t-name" id="t-name"></div>
        <div class="t-hours" id="t-hours"></div>
        <div class="t-genres" id="t-genres"></div>
    </div>
    <div id="legend"></div>
    <div id="hint">Scroll to zoom &middot; Drag to pan<br>Click a node to open in Steam</div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>

    // Building graph from games with D3 graph framework

    let simulation = null;
    function nodeRadius(playtimeMinutes) {
        const hrs = playtimeMinutes / 60;
        return Math.max(8, Math.min(40, 4 + Math.log1p(hrs) * 5));
    }

    function setStatus(msg, isError = false) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = isError ? 'error' : '';
    }


    async function loadGames() {
        const input = document.getElementById('steam-id-input').value.trim();
        if (!input) { setStatus('Please enter a Steam ID.', true); return; }

        setStatus('Loading games…');
        if (simulation) simulation.stop();
        d3.select('#graph-container svg').remove();
        document.getElementById('legend').style.display = 'none';

        let games;
        try {
            const res = await fetch('/get-games', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ steam_id: input })
            });
            const data = await res.json();
            if (!res.ok || data.error) { setStatus(data.error || 'Failed to load games.', true); return; }
            games = data.games || [];
        } catch (err) {
            setStatus('Network error: ' + err.message, true);
            return;
        }

        if (games.length === 0) { setStatus('No games found (profile may be private).', true); return; }

        // Sort by playtime so top-N for genre fetch are the most-played
        games.sort((a, b) => b.playtime_forever - a.playtime_forever);

        setStatus(`${games.length} games found — fetching genre data for top 50…`);

        // Render nodes immediately (no edges yet)
        renderGraph(games, {});

        // Fetch genres for top 50
        const top50 = games.slice(0, 50).map(g => g.appid);
        let genreMap = {};
        try {
            const res = await fetch('/get-genres', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ appids: top50 })
            });
            const data = await res.json();
            genreMap = data.genres || {};
        } catch (_) { /* genre fetch failed, graph still works without edges */ }

        // Re-render with edges
        if (simulation) simulation.stop();
        d3.select('#graph-container svg').remove();
        renderGraph(games, genreMap);
    }

    // ── graph ─────────────────────────────────────────────────────────────────

    function renderGraph(games, genreMap) {
        const container = document.getElementById('graph-container');
        const W = container.clientWidth;
        const H = container.clientHeight;

        // ── build genre color scale ───────────────────────────────────────────
        // Count genre frequency across fetched games
        const genreCount = {};
        Object.values(genreMap).forEach(genres => {
            genres.forEach(g => { genreCount[g] = (genreCount[g] || 0) + 1; });
        });
        const totalFetched = Object.keys(genreMap).length || 1;

        // Mark genres that appear in >40% of fetched games as ubiquitous (skip for edges)
        const ubiquitous = new Set(
            Object.entries(genreCount)
                .filter(([, c]) => c / totalFetched > 0.4)
                .map(([g]) => g)
        );

        // Top 10 genres by frequency → assign Tableau10 colors
        const topGenres = Object.entries(genreCount)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 10)
            .map(([g]) => g);

        const colorScale = d3.scaleOrdinal(d3.schemeTableau10).domain(topGenres);
        const FALLBACK_COLOR = '#4a6a8a';

        function nodeColor(appid) {
            const genres = genreMap[String(appid)] || [];
            for (const g of genres) {
                if (topGenres.includes(g)) return colorScale(g);
            }
            return FALLBACK_COLOR;
        }

        // ── nodes ─────────────────────────────────────────────────────────────
        const nodes = games.map(g => ({
            id: g.appid,
            name: g.name,
            playtime: g.playtime_forever,
            genres: genreMap[String(g.appid)] || [],
            radius: nodeRadius(g.playtime_forever),
            color: nodeColor(g.appid)
        }));

        const nodeById = new Map(nodes.map(n => [n.id, n]));

        // ── edges ─────────────────────────────────────────────────────────────
        // Only between games that have genre data and share a non-ubiquitous genre
        const edges = [];
        const appidsWithGenres = Object.keys(genreMap).map(Number);

        for (let i = 0; i < appidsWithGenres.length; i++) {
            for (let j = i + 1; j < appidsWithGenres.length; j++) {
                const a = appidsWithGenres[i];
                const b = appidsWithGenres[j];
                const ga = new Set((genreMap[a] || []).filter(g => !ubiquitous.has(g)));
                const gb = (genreMap[b] || []).filter(g => !ubiquitous.has(g));
                const shared = gb.filter(g => ga.has(g));
                if (shared.length > 0 && nodeById.has(a) && nodeById.has(b)) {
                    edges.push({ source: a, target: b, weight: shared.length });
                }
            }
        }

        const edgeCount = edges.length;
        const gameCount = nodes.length;

        setStatus(`${gameCount} games · ${edgeCount} genre connections`);

        // ── SVG setup ─────────────────────────────────────────────────────────
        const svg = d3.select('#graph-container').append('svg');
        const g = svg.append('g');

        svg.call(
            d3.zoom()
                .scaleExtent([0.05, 8])
                .on('zoom', e => g.attr('transform', e.transform))
        );

        // ── draw edges ────────────────────────────────────────────────────────
        const link = g.append('g')
            .selectAll('line')
            .data(edges)
            .join('line')
            .attr('stroke', '#4a6a8a')
            .attr('stroke-opacity', 0.35)
            .attr('stroke-width', d => Math.min(d.weight, 3));

        // ── draw nodes ────────────────────────────────────────────────────────
        const tooltip = document.getElementById('tooltip');

        const node = g.append('g')
            .selectAll('circle')
            .data(nodes)
            .join('circle')
            .attr('r', d => d.radius)
            .attr('fill', d => d.color)
            .attr('fill-opacity', 0.85)
            .attr('stroke', d => d3.color(d.color) ? d3.color(d.color).brighter(0.6) : '#fff')
            .attr('stroke-width', 1)
            .style('cursor', 'pointer')
            .on('mouseover', function(event, d) {
                // dim all others
                node.attr('fill-opacity', n => n === d ? 1 : 0.15);
                link.attr('stroke-opacity', l =>
                    (l.source === d || l.target === d) ? 0.8 : 0.05
                );

                const hrs = (d.playtime / 60).toFixed(1);
                document.getElementById('t-name').textContent = d.name;
                document.getElementById('t-hours').textContent =
                    hrs === '0.0' ? 'Never played' : `${hrs} hrs played`;
                document.getElementById('t-genres').textContent =
                    d.genres.length ? d.genres.join(', ') : 'No genre data';
                tooltip.style.opacity = '1';
            })
            .on('mousemove', event => {
                const rect = container.getBoundingClientRect();
                let x = event.clientX - rect.left + 14;
                let y = event.clientY - rect.top + 14;
                if (x + 230 > W) x -= 240;
                if (y + 90 > H) y -= 100;
                tooltip.style.left = x + 'px';
                tooltip.style.top = y + 'px';
            })
            .on('mouseout', function() {
                node.attr('fill-opacity', 0.85);
                link.attr('stroke-opacity', 0.35);
                tooltip.style.opacity = '0';
            })
            .on('click', (event, d) => {
                window.open(`https://store.steampowered.com/app/${d.id}/`, '_blank');
            })
            .call(
                d3.drag()
                    .on('start', (event, d) => {
                        if (!event.active) simulation.alphaTarget(0.3).restart();
                        d.fx = d.x; d.fy = d.y;
                    })
                    .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                    .on('end', (event, d) => {
                        if (!event.active) simulation.alphaTarget(0);
                        d.fx = null; d.fy = null;
                    })
            );

        // ── simulation ────────────────────────────────────────────────────────
        simulation = d3.forceSimulation(nodes)
            .force('link', d3.forceLink(edges).id(d => d.id).distance(80).strength(0.3))
            .force('charge', d3.forceManyBody().strength(-120))
            .force('center', d3.forceCenter(W / 2, H / 2))
            .force('collide', d3.forceCollide(d => d.radius + 3).iterations(2))
            .alphaDecay(0.025)
            .on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                node
                    .attr('cx', d => d.x)
                    .attr('cy', d => d.y);
            });

        // ── legend ────────────────────────────────────────────────────────────
        const legendEl = document.getElementById('legend');
        legendEl.innerHTML = '<h4>Genre</h4>';

        topGenres.forEach(genre => {
            const item = document.createElement('div');
            item.className = 'legend-item';
            item.innerHTML = `<div class="legend-dot" style="background:${colorScale(genre)};"></div><span>${genre}</span>`;
            legendEl.appendChild(item);
        });

        // "Other / no data" entry
        const other = document.createElement('div');
        other.className = 'legend-item';
        other.innerHTML = `<div class="legend-dot" style="background:${FALLBACK_COLOR};"></div><span>Other / no data</span>`;
        legendEl.appendChild(other);

        legendEl.style.display = 'block';
    }

    document.getElementById('steam-id-input')
        .addEventListener('keydown', e => { if (e.key === 'Enter') loadGames(); });
</script>

</body>
</html>
